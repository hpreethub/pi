<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Find Your DOB in Pi</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    input, button { padding: 10px; font-size: 16px; }
    #result { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>🔍 Find Your DOB in Pi</h2>
  <p>Enter DOB (ddmmyy) — zeros will be removed automatically</p>
  <input type="text" id="dob" placeholder="e.g. 010203">
  <button onclick="searchPi()">Search</button>

  <div id="result"></div>

  <script>
    async function searchPi() {
      let dob = document.getElementById('dob').value.trim();

      if (!/^\d{6}$/.test(dob)) {
        document.getElementById('result').innerText = '❌ Enter valid 6-digit DOB';
        return;
      }

      // remove zeros
      let query = dob.replace(/0/g, '');

      if (query.length === 0) {
        document.getElementById('result').innerText = '❌ Invalid after removing zeros';
        return;
      }

      document.getElementById('result').innerText = '⏳ Searching...';

      try {
        let res = await fetch(`https://api.pi.delivery/v1/pi?start=0&numberOfDigits=1000000`);
        let data = await res.json();

        let piDigits = data.content;

        let index = piDigits.indexOf(query);

        if (index !== -1) {
          document.getElementById('result').innerText = `✅ Found at position: ${index}`;
        } else {
          document.getElementById('result').innerText = '❌ Not found in first 1M digits';
        }

      } catch (err) {
        document.getElementById('result').innerText = '⚠️ Error fetching Pi data';
      }
    }
  </script>
</body>
</html>
